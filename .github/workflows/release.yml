name: Release
concurrency: release-${{ github.ref }}

on:
    workflow_dispatch:
    schedule:
        - cron: "0 0 * * 5"

permissions:
    contents: write
    issues: write
    pull-requests: write
    id-token: write

jobs:
    release:
        uses: Forsakringskassan/.github/.github/workflows/npm-release.yaml@284e9f65aaaa9f863cfd8fb9efc27b5f322397ca # main
        with:
            app-id: ${{ vars.RELEASE_APP_ID }}
        secrets:
            app-key: ${{ secrets.RELEASE_APP_KEY }}
    deploy-documentation:
        needs: [release]
        name: Deploy new documentation
        uses: ./.github/workflows/docs.yml
