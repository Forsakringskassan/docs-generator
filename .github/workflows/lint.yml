name: Lint

on: [push, pull_request]

permissions:
    contents: read

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
            - name: Use Node.js 24.x
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
              with:
                  node-version: 24.x
            - name: Install dependencies
              run: npm ci
            - name: Build
              run: npm run build
            - name: Prettier
              run: npm run prettier:check
            - name: ESLint
              if: success() || failure()
              run: npm exec eslint -- --max-warnings 0 --ignore-pattern docs/examples/ .
            - name: Stylelint
              if: success() || failure()
              run: npm run stylelint -- --max-warnings 0
            - name: Build
              run: npm run --if-present build
            - name: Lint examples
              run: npm exec eslint -- --max-warnings 0 docs/examples/

    npm-pkg-lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
            - name: Use Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
              with:
                  node-version: 24.x
            - name: Install Dependencies
              run: npm ci
            - name: npm-pkg-lint
              uses: ext/npm-pkg-lint@62ea2b6ee639fc990406b131e8822e48c3da0889 # v5.2.0
              with:
                  allow-dependencies: "@babel/parser,@babel/traverse"
